services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-bot
    ports:
      - "3001:3001"
    env_file:
      - backend/.env
    environment:
      - PORT=3001
      - NODE_ENV=production
    volumes:
      - ./data:/usr/src/app/data
    restart: unless-stopped
