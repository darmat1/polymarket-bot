services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-bot
    ports:
      - "3001:3001"
    env_file:
      - backend/.env
    environment:
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped
  
  listener:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-listener
    command: ["node", "backend/dist/blockchain-listener.js"]
    env_file:
      - backend/.env
    restart: unless-stopped
